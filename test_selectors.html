<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试选择器 - 嗷呜动漫</title>
    <style>
        .swiper-slide { padding: 10px; background: #e0e0e0; margin: 5px; }
        .anthology-list-box { border: 1px solid #ccc; margin: 10px 0; }
        .anthology-list-play li { list-style: none; padding: 5px; }
        .vod-detail { border: 1px solid #ddd; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>测试 getTracks 函数的选择器</h1>

    <!-- 线路标题 - 对应 a.swiper-slide -->
    <div class="swiper-wrapper">
        <a class="swiper-slide">正线路</a>
        <a class="swiper-slide">备线路</a>
        <a class="swiper-slide">极速线路</a>
    </div>

    <!-- 播放列表 - 对应 div.anthology-list-box -->
    <div class="anthology-list-box">
        <h3>正线路</h3>
        <ul class="anthology-list-play">
            <li><a href="/vod/play/1/1.html">第1集</a></li>
            <li><a href="/vod/play/1/2.html">第2集</a></li>
            <li><a href="/vod/play/1/3.html">第3集</a></li>
        </ul>
    </div>

    <div class="anthology-list-box">
        <h3>备线路</h3>
        <ul class="anthology-list-play">
            <li><a href="/vod/play/2/1.html">第01集</a></li>
            <li><a href="/vod/play/2/2.html">第02集</a></li>
            <li><a href="/vod/play/2/3.html">第03集</a></li>
        </ul>
    </div>

    <hr>

    <h1>测试 search 函数的选择器</h1>

    <!-- 搜索结果 - 对应 div.vod-detail -->
    <div class="vod-detail">
        <div class="detail-pic">
            <img src="https://example.com/pic1.jpg" data-src="https://example.com/data-pic1.jpg" alt="图片">
        </div>
        <div class="detail-info">
            <a href="/vods/detail/id/12345.html">
                <h3 class="slide-info-title">葬送的芙莉莲 第二季</h3>
            </a>
            <span class="slide-info-remarks">更新至12集</span>
        </div>
    </div>

    <div class="vod-detail">
        <div class="detail-pic">
            <img src="" data-original="https://example.com/data-original.jpg" alt="图片">
        </div>
        <div class="detail-info">
            <a href="/vods/detail/id/67890.html">
                <h3 class="slide-info-title">我推的孩子 第三季</h3>
            </a>
            <span class="slide-info-remarks">全12集</span>
        </div>
    </div>

    <script>
        // 测试选择器
        console.log('=== 测试 getTracks 选择器 ===');

        // 测试线路标题
        const titles = [];
        document.querySelectorAll('a.swiper-slide').forEach((elem) => {
            const title = elem.textContent.trim().replace(/\s+/g, '').substring(0, 20);
            if (title) titles.push(title);
        });
        console.log('线路标题:', titles);

        // 测试播放列表
        const result = [];
        document.querySelectorAll('div.anthology-list-box').forEach((elem, i) => {
            let tracks = [];

            elem.querySelectorAll('ul.anthology-list-play li a').forEach((linkElem) => {
                const name = linkElem.textContent.trim();
                const href = linkElem.getAttribute('href');
                if (!href) return;

                // 提取集数
                let match = name.match(/\d+/);
                if (match) {
                    name = match[0].padStart(2, '0');
                }

                tracks.push({
                    'name': name,
                    'url': href
                });
            });

            if (tracks.length === 0) return;

            // 排序
            tracks.sort((a, b) => parseInt(a.name) - parseInt(b.name));

            result.push({
                'title': titles[i] || '线路' + (i + 1),
                'tracks': tracks
            });
        });

        console.log('播放列表结果:', JSON.stringify(result, null, 2));

        console.log('\n=== 测试 search 选择器 ===');

        const list = [];
        document.querySelectorAll('div.vod-detail').forEach((elem) => {
            const titleElem = elem.querySelector('.detail-info > a');
            const imgElem = elem.querySelector('.detail-pic img');

            const vodId = titleElem?.getAttribute('href') || '';
            const pic = imgElem?.getAttribute('data-src') ||
                       imgElem?.getAttribute('data-original') ||
                       imgElem?.getAttribute('src') || '';

            list.push({
                'vod_id': vodId,
                'vod_name': elem.querySelector('h3.slide-info-title')?.textContent?.trim() || '',
                'vod_pic': pic,
                'vod_remarks': elem.querySelector('span.slide-info-remarks')?.textContent?.trim() || ''
            });
        });

        console.log('搜索结果:', JSON.stringify(list, null, 2));
    </script>
</body>
</html>
